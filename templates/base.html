<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Security Auditor</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    

    <style>
        /* Улучшенная навигация */
        .navbar {
            background: linear-gradient(135deg, #cf86c9 0%, #764ba2 100%);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }
        
        .nav-brand h1 {
            font-size: 1.5rem;
            margin: 0;
            color: rgb(46, 63, 16);
        }
        
        .nav-brand i {
            font-size: 1.8rem;
        }
        
        /* Горизонтальное меню */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            white-space: nowrap;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            text-decoration: none;
        }
        
        .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        /* Время справа */
        .nav-time {
            color: white;
            font-size: 0.9rem;
            white-space: nowrap;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }
        
        /* Убираем выпадающее меню для настроек */
        .settings-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* Скрываем иконку выпадающего меню */
        .nav-link.dropdown-toggle::after {
            display: none;
        }
        
        /* Адаптивность */
        @media (max-width: 1200px) {
            .nav-links {
                gap: 10px;
            }
            .nav-link {
                padding: 6px 8px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 992px) {
            .nav-links {
                overflow-x: auto;
                padding-bottom: 5px;
            }
            .nav-brand h1 {
                font-size: 1.3rem;
            }
        }
        
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            
            .nav-links {
                order: 2;
                justify-content: center;
            }
            
            .nav-brand {
                order: 1;
                justify-content: center;
            }
            
            .nav-time {
                order: 3;
                text-align: center;
                margin-top: 5px;
            }
        }
    </style>
        <style>
        /* Ваши существующие стили... */
        
        /* ДОБАВЬТЕ ЭТО: */
        body {
            background: #b1d9ff !important;  /* ← ваш цвет фона */
        }
        /* Быстрые улучшения внешнего вида */


        /* Более плавные карточки */
        .stat-card, .computer-card, .report-card, .empty-state {
            border-radius: 20 !important;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08) !important;
            transition: transform 0.2s, box-shadow 0.2s !important;
        }



/* ========== НОВЫЙ ДИЗАЙН ========== */

        /* 1. ФУТЕР И РАЗДЕЛИТЕЛИ */
        .footer {
            margin-top: 3rem;
            padding: 2rem 0;
            text-align: center;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.1);
            border-radius: 16px 16px 0 0;
            color: #2d3e50;
            font-weight: 500;
        }

        /* Разделители между элементами */
        hr, .divider {
            border: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            margin: 1.5rem 0;
        }

        /* 2. ШРИФТЫ */
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
            letter-spacing: 0.3px;
        }

        /* Заголовки */
        h1, h2, h3, h4, .page-header h2, .stat-content h3 {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        /* 3. ТЕНИ КАРТОЧЕК */
        .stat-card, .computer-card, .report-card, .empty-state, 
        .form-container, .verification-sidebar, .verification-main, 
        .settings-container {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08) !important;
            transition: box-shadow 0.3s ease, transform 0.2s ease !important;
        }

        /* Эффект при наведении */
        .stat-card:hover, .computer-card:hover, .report-card:hover {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15) !important;
            transform: translateY(-3px);
        }

        /* 4. ДОПОЛНИТЕЛЬНО: СКРУГЛЕНИЕ УГЛОВ */
        .stat-card, .computer-card, .report-card, .empty-state, 
        .form-container, .verification-sidebar, .verification-main, 
        .settings-container, .navbar {
            border-radius: 16px !important;
        }

    /* Опционально: сделать белые карточки полупрозрачными */
    .stat-card, .computer-card, .empty-state, 
    .form-container, .verification-sidebar, 
    .verification-main, .report-card, .settings-container {
        background: rgba(240, 240, 240, 0.95);
    }
    </style>
</head>
<body>
    <div class="container">
        <!-- Упрощенная навигация -->
        <nav class="navbar d-flex justify-content-between align-items-center flex-wrap">
            <!-- Бренд и логотип -->
            <div class="nav-brand">
                <i class="fas fa-shield-alt"></i>
                <h1>Security Auditor</h1>
            </div>
            
            <!-- Горизонтальное меню -->
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <i class="fas fa-home"></i> Главная
                </a>
                <a href="/computers" class="nav-link {% if '/computers' in request.path %}active{% endif %}">
                    <i class="fas fa-desktop"></i> Компьютеры
                </a>
                <a href="/verification" class="nav-link {% if '/verification' in request.path %}active{% endif %}">
                    <i class="fas fa-search"></i> Проверка
                </a>
                <a href="/reports" class="nav-link {% if '/reports' in request.path %}active{% endif %}">
                    <i class="fas fa-chart-bar"></i> Отчеты
                </a>
                <a href="/settings/ispdn" class="nav-link {% if '/settings/ispdn' in request.path %}active{% endif %}">
                        <i class="fas fa-shield-alt"></i> ИСПДн
                    </a>
                    <a href="/ispdn/analyze" class="nav-link {% if '/ispdn/analyze' in request.path %}active{% endif %}">
                        <i class="fas fa-search"></i> Анализ
                    </a>
                    <a href="/ispdn/requirements" class="nav-link {% if '/ispdn/requirements' in request.path %}active{% endif %}">
                        <i class="fas fa-clipboard-list"></i> Требования
                    </a>
                <!-- Настройки и ИСПДн в одной линии -->
            </div>
            
            <!-- Время -->
            <div class="nav-time">{{ current_time }}</div>
        </nav>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <p>© 2024 Security Auditor v1.0 | Система верификации безопасности ИСПДн</p>
        </footer>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/static/js/main.js"></script>
    
</body>
</html>
