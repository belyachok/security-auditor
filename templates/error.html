<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title|default('Ошибка') }} - Security Auditor</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 20px;
        }
        
        .error-code {
            font-size: 2.5rem;
            font-weight: bold;
            color: #495057;
            margin-bottom: 10px;
        }
        
        .error-message {
            color: #6c757d;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        @media (max-width: 576px) {
            .error-container {
                padding: 30px 20px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="error-container text-center">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <h1 class="error-code">
            {{ error_code|default('Ошибка') }}
        </h1>
        
        <div class="error-message">
            {{ error_message|default('Произошла неизвестная ошибка') }}
        </div>
        
        <div class="action-buttons">
            <a href="/" class="btn btn-primary flex-grow-1">
                <i class="fas fa-home me-2"></i>На главную
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary flex-grow-1">
                <i class="fas fa-arrow-left me-2"></i>Назад
            </a>
        </div>
        
        <div class="mt-4 text-muted small">
            <p>Если ошибка повторяется, обратитесь к администратору системы.</p>
            <!-- УДАЛИТЕ ИЛИ ИСПРАВЬТЕ ЭТУ СТРОКУ: -->
            <p class="mb-0">System ID: {{ timestamp|default('') }}</p>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
