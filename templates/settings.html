{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2>Настройки системы</h2>
    <p class="subtitle">Настройка параметров проверки безопасности</p>
</div>

<div class="settings-container">
    <div class="settings-group">
        <h3>Общие настройки</h3>
        
        <div class="form-group">
            <label class="form-label">Название организации</label>
            <input type="text" class="form-control" value="Моя компания">
        </div>
        
        <div class="form-group">
            <label class="form-label">Частота автоматических проверок</label>
            <select class="form-control">
                <option value="daily">Ежедневно</option>
                <option value="weekly" selected>Еженедельно</option>
                <option value="monthly">Ежемесячно</option>
                <option value="never">Никогда</option>
            </select>
        </div>
        
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" checked>
                <span>Отправлять уведомления по email</span>
            </label>
        </div>
    </div>

    <div class="settings-group">
        <h3>Требования безопасности</h3>
        
        <div class="requirements-list">
            <div class="requirement-item">
                <label class="checkbox-label">
                    <input type="checkbox" checked>
                    <span>Парольная политика (мин. 12 символов)</span>
                </label>
            </div>
            
            <div class="requirement-item">
                <label class="checkbox-label">
                    <input type="checkbox" checked>
                    <span>Антивирусная защита</span>
                </label>
            </div>
            
            <div class="requirement-item">
                <label class="checkbox-label">
                    <input type="checkbox" checked>
                    <span>Сетевой экран</span>
                </label>
            </div>
            
            <div class="requirement-item">
                <label class="checkbox-label">
                    <input type="checkbox">
                    <span>Шифрование дисков</span>
                </label>
            </div>
            
            <div class="requirement-item">
                <label class="checkbox-label">
                    <input type="checkbox" checked>
                    <span>Обновления системы</span>
                </label>
            </div>
        </div>
    </div>

    <div class="settings-group">
        <h3>Уведомления</h3>
        
        <div class="form-group">
            <label class="form-label">Email для уведомлений</label>
            <input type="email" class="form-control" placeholder="admin@company.com">
        </div>
        
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" checked>
                <span>Уведомлять о критических уязвимостях</span>
            </label>
        </div>
        
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox">
                <span>Уведомлять о всех проверках</span>
            </label>
        </div>
    </div>

    <div class="settings-actions">
        <button class="btn btn-primary">
            <i class="fas fa-save"></i> Сохранить настройки
        </button>
        <button class="btn btn-outline">
            <i class="fas fa-undo"></i> Сбросить настройки
        </button>
    </div>
</div>

<script>
// Здесь будет логика сохранения настроек
</script>
{% endblock %}
